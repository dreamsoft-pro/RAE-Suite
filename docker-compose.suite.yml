# RAE-Suite Factory Modules (v4.8) - SERVICE MODE WITH HEALTHCHECKS
services:
  rae-hive:
    build: ../RAE-Hive
    container_name: rae-hive
    command: python hive_engine.py
    restart: unless-stopped
    environment:
      - RAE_API_URL=http://rae-api-dev:8000
    volumes:
      - ../RAE-Hive:/app
      - ../RAE-Lab/experiments:/app/experiments
      - ../RAE-agentic-memory/rae-core/rae_core:/app/rae_core
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rae-internal

  rae-phoenix:
    build: ../RAE-Phoenix
    container_name: rae-phoenix
    command: python main.py
    restart: unless-stopped
    environment:
      - RAE_API_URL=http://rae-api-dev:8000
    volumes:
      - ../RAE-Phoenix:/app
      - ../RAE-Lab/experiments:/app/experiments
      - ../RAE-agentic-memory/rae-core/rae_core:/app/rae_core
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rae-internal

  rae-quality:
    build: ../RAE-Quality
    container_name: rae-quality
    restart: unless-stopped
    command: python main.py
    environment:
      - RAE_API_URL=http://rae-api-dev:8000
    volumes:
      - ../RAE-Quality:/app
      - ../RAE-agentic-memory/rae-core/rae_core:/app/rae_core
      - /home/print/cloud:/projects:ro
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rae-internal

  rae-lab:
    build: ../RAE-Lab
    container_name: rae-lab
    restart: unless-stopped
    command: python metrics_aggregator.py
    environment:
      - RAE_API_URL=http://rae-api-dev:8000
    volumes:
      - ../RAE-Lab:/app
      - ../RAE-Lab/experiments:/app/experiments
      - ../RAE-agentic-memory/rae-core/rae_core:/app/rae_core
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rae-internal

networks:
  rae-internal:
    external: true
    name: rae-internal
