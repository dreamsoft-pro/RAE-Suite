services:
  rae-open-claw:
    build: 
      context: .
      dockerfile: Dockerfile.rae
    container_name: rae-open-claw
    restart: unless-stopped
    command: ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789"]
    environment:
      - RAE_API_URL=http://rae-api-dev:8000
      - RAE_TENANT_ID=53717286-fe94-4c8f-baf9-c4d2758eb672
      - RAE_PROJECT_NAME=dreamsoft_factory
    volumes:
      - .:/app
      - /mnt/extra_storage/dreamsoft_factory:/workspace
    networks:
      - rae-internal

networks:
  rae-internal:
    external: true
    name: rae-internal
