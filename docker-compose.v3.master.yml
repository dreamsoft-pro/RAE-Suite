version: "3.9"

services:
  rae-suite:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: rae-suite-v3
    ports:
      - "8009:8009"
    networks:
      - rae-internal

  rae-memory:
    build:
      context: ../RAE-agentic-memory
      dockerfile: Dockerfile
    container_name: rae-memory-v3
    ports:
      - "8000:8000"
    networks:
      - rae-internal

  rae-lab:
    build:
      context: ../RAE-Lab
      dockerfile: Dockerfile
    container_name: rae-lab-v3
    ports:
      - "8011:8011"
    networks:
      - rae-internal

networks:
  rae-internal:
    name: rae-internal
    driver: bridge
