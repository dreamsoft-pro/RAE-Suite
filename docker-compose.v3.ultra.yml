version: "3.9"

services:
  rae-core:
    build:
      context: ../RAE-core
      dockerfile: pyproject.toml
    image: rae-core:v1.1.0
    restart: "no"

  rae-memory:
    build:
      context: ../RAE-agentic-memory
      dockerfile: Dockerfile
    container_name: rae-memory-v3
    ports:
      - "8000:8000"
    environment:
      - RAE_API_URL=http://localhost:8000
      - POSTGRES_DB=rae_memory
      - POSTGRES_USER=operator
      - POSTGRES_PASSWORD=(2ITj|xB.?%1~CeA>dCT{RJ`6rM2Q{E9WwjR9%lk
    volumes:
      - rae-memory-db-data:/var/lib/postgresql/data
    networks:
      - rae-internal

  rae-redis:
    image: redis:7-alpine
    container_name: rae-redis-v3
    ports:
      - "6379:6379"
    volumes:
      - rae-redis-cache-data:/data
    networks:
      - rae-internal

  rae-qdrant:
    image: qdrant/qdrant:latest
    container_name: rae-qdrant-v3
    ports:
      - "6333:6333"
    volumes:
      - rae-qdrant-vector-data:/qdrant/storage
    networks:
      - rae-internal

  rae-suite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rae-suite-v3
    ports:
      - "8009:8009"
    depends_on:
      - rae-memory
      - rae-redis
    networks:
      - rae-internal

  rae-lab:
    build:
      context: ../RAE-Lab
      dockerfile: Dockerfile
    container_name: rae-lab-v3
    ports:
      - "8011:8011"
    depends_on:
      - rae-suite
    networks:
      - rae-internal

  rae-quality:
    build:
      context: ../RAE-Quality
      dockerfile: Dockerfile
    container_name: rae-quality-v3
    ports:
      - "8010:8010"
    depends_on:
      - rae-suite
    networks:
      - rae-internal

  rae-phoenix:
    build:
      context: ../RAE-Phoenix
      dockerfile: Dockerfile
    container_name: rae-phoenix-v3
    ports:
      - "8012:8012"
    depends_on:
      - rae-suite
    networks:
      - rae-internal

  rae-hive:
    build:
      context: ../RAE-Hive_eyes
      dockerfile: Dockerfile
    container_name: rae-hive-v3
    ports:
      - "8013:8013"
    depends_on:
      - rae-suite
    networks:
      - rae-internal

  rae-openclaw:
    build:
      context: ../RAE-openclaw
      dockerfile: Dockerfile.rae
    container_name: rae-openclaw-v3
    ports:
      - "18789:18789"
    networks:
      - rae-internal

volumes:
  rae-memory-db-data:
    name: rae-memory-db-data
  rae-redis-cache-data:
    name: rae-redis-cache-data
  rae-qdrant-vector-data:
    name: rae-qdrant-vector-data

networks:
  rae-internal:
    name: rae-internal
    driver: bridge
