services:
  rae-am-postgres:
    image: ankane/pgvector:latest
    container_name: rae-am-postgres-v3
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=rae
      - POSTGRES_USER=rae
      - POSTGRES_PASSWORD=rae
    volumes:
      - rae-memory-db-data:/var/lib/postgresql/data
    networks:
      - rae-internal

  rae-am-redis:
    image: redis:7-alpine
    container_name: rae-am-redis-v3
    ports:
      - "6379:6379"
    volumes:
      - rae-redis-cache-data:/data
    networks:
      - rae-internal

  rae-am-qdrant:
    image: qdrant/qdrant:latest
    container_name: rae-am-qdrant-v3
    ports:
      - "6333:6333"
    volumes:
      - rae-qdrant-vector-data:/qdrant/storage
    networks:
      - rae-internal

  rae-memory:
    build:
      context: ../RAE-agentic-memory
      dockerfile: Dockerfile
    #container_name: rae-memory-v3
    ports:
      - "8000:8000"
    environment:
      - RAE_API_URL=http://localhost:8000
      - POSTGRES_HOST=rae-am-postgres
      - POSTGRES_DB=rae
      - POSTGRES_USER=rae
      - POSTGRES_PASSWORD=rae
      - REDIS_HOST=rae-am-redis
      - QDRANT_HOST=rae-am-qdrant
      - PYTHONPATH=/app:/app/rae-core/src
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ../RAE-core:/app/rae-core
      - ~/.gemini/oauth_creds.json:/root/.gemini/oauth_creds.json:ro
    depends_on:
      - rae-am-postgres
      - rae-am-redis

    networks:
      - rae-internal

  rae-suite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rae-suite-v3
    ports:
      - "8009:8009"
    environment:
      - RAE_API_URL=http://rae-memory:8000
      - PYTHONPATH=/app:/app/packages/rae-core/src
    volumes:
      - ../RAE-core:/app/packages/rae-core
    depends_on:
      - rae-memory
    networks:
      - rae-internal

  rae-lab:
    build:
      context: ../RAE-Lab
      dockerfile: Dockerfile
    container_name: rae-lab-v3
    ports:
      - "8011:8011"
    environment:
      - PYTHONPATH=/app:/app/packages/rae-core/src
    volumes:
      - ../RAE-core:/app/packages/rae-core
    depends_on:
      - rae-suite
    networks:
      - rae-internal

  rae-quality:
    build:
      context: ../RAE-Quality
      dockerfile: Dockerfile
    container_name: rae-quality-v3
    ports:
      - "8010:8010"
    environment:
      - PYTHONPATH=/app:/app/packages/rae-core/src
    volumes:
      - ../RAE-core:/app/packages/rae-core
    depends_on:
      - rae-suite
    networks:
      - rae-internal

  rae-phoenix:
    build:
      context: ../RAE-Phoenix
      dockerfile: Dockerfile
    container_name: rae-phoenix-v3
    ports:
      - "8012:8012"
    environment:
      - PYTHONPATH=/app:/app/packages/rae-core/src
    volumes:
      - ../RAE-core:/app/packages/rae-core
    depends_on:
      - rae-suite
    networks:
      - rae-internal

  rae-hive:
    build:
      context: ../RAE-Hive_eyes
      dockerfile: Dockerfile
    container_name: rae-hive-v3
    ports:
      - "8013:8013"
    environment:
      - PYTHONPATH=/app:/app/packages/rae-core/src
    volumes:
      - ../RAE-core:/app/packages/rae-core
    depends_on:
      - rae-suite
    networks:
      - rae-internal

  rae-openclaw:
    build:
      context: ./packages/rae-open-claw
      dockerfile: Dockerfile.rae
    container_name: rae-openclaw-v3
    ports:
      - "18789:18789"
    volumes:
      - ./.openclaw_config:/root/.openclaw
    command: ["node", "dist/index.js", "gateway"]
    networks:
      - rae-internal

volumes:
  rae-memory-db-data:
    name: rae-memory-db-data
  rae-redis-cache-data:
    name: rae-redis-cache-data
  rae-qdrant-vector-data:
    name: rae-qdrant-vector-data

networks:
  rae-internal:
    name: rae-internal
    driver: bridge
